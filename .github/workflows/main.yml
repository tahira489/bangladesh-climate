name: Collect climate data hourly

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests python-dotenv

      - name: Run data collection
        env:
          AQICN_TOKEN: ${{ secrets.AQICN_TOKEN }}
        run: python collect_once.py

      - name: Save database back to repo
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add climate.db
          git diff --staged --quiet || git commit -m "Data: hourly climate update $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push
